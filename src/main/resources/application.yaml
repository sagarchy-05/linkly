spring:
  application:
    name: curtli
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.batch_size: 50
        order_inserts: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 200ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8

server:
  port: 8080
  compression:
    enabled: true

curtli:
  base-url: ${CURTLI_BASE_URL:http://localhost:8080}
  cache-ttl-seconds: 86400
  rate-limit:
    anonymous-per-minute: 10
    authenticated-per-minute: 100
    bulk-max: ${RATE_LIMIT_BULK_MAX:1}
    bulk-minutes: ${RATE_LIMIT_BULK_MINUTES:5}
  bulk-batch-size: ${BULK_BATCH_SIZE:20}
  click-stream:
    name: "click_events"
    consumer-group: "curtli-group"
    consumer-name: ${HOSTNAME:curtli-worker-1}
    poll-delay: ${STREAM_POLL_DELAY:1000}
    batch-size: ${STREAM_BATCH_SIZE:200}
    block-millis: ${STREAM_BLOCK_MILLIS:500}
  async:
    core-pool-size: ${ASYNC_CORE_POOL:4}
    max-pool-size: ${ASYNC_MAX_POOL:16}
    queue-capacity: ${ASYNC_QUEUE_CAPACITY:2000}


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.sagar.curtli: INFO
    org.hibernate.SQL: WARN