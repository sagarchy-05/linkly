<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0a0a0c">
  <title>curtli — make links short</title>
  <meta name="description" content="Shorten up to 20 links at a time. Optional custom aliases. History stays on your device.">
  <link rel="stylesheet" href="/styles.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a78bfa' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d='M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71'/><path d='M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71'/></svg>">
</head>
<body>
  <div class="page">

    <header class="header">
      <a href="/" class="brand" aria-label="curtli home">
        <svg class="brand-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <span class="brand-name">curtli</span>
      </a>
    </header>

    <main class="main">

      <section class="hero">
        <h1 class="hero-title">Curtli your links.</h1>
      </section>

      <section class="card shortener">
        <form id="shorten-form" autocomplete="off" novalidate>
          <div id="rows" class="rows" aria-live="polite"></div>

          <div class="form-footer">
            <button type="button" id="add-row" class="btn-add" aria-label="Add another link">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 5v14M5 12h14"/>
              </svg>
            </button>

            <button type="submit" id="submit-btn" class="btn btn-primary">
              <span class="btn-label">Shorten</span>
              <svg class="btn-spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
                <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
              </svg>
            </button>
          </div>
          <p class="row-counter" id="row-counter">1 / 20</p>
        </form>

        <div id="banner" class="banner hidden" role="alert"></div>
      </section>

      <section id="results-section" class="results hidden" aria-live="polite">
        <h2 class="section-title">Just shortened</h2>
        <div id="results" class="results-list"></div>
      </section>

      <section class="history-section">
        <h2 class="section-title">Your links</h2>
        <div id="history" class="history-list"></div>
        <p id="history-empty" class="empty">Your shortened links will live here.</p>
      </section>

    </main>

    <footer class="footer">
      <div class="footer-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <a href="https://curtli.com" class="footer-link" target="_blank" rel="noopener">curtli.com</a>
      </div>
      <p class="footer-note">Your link history stays in your browser.</p>
      <p class="footer-fine">© 2026 curtli</p>
    </footer>

  </div>

  <!-- ===== templates ===== -->

  <template id="tpl-row">
    <div class="row" data-row>
      <div class="row-line">
        <div class="row-inputs">
          <input
            type="url"
            class="input input-url"
            name="longUrl"
            placeholder="https://example.com/your-long-url"
            autocomplete="off"
            spellcheck="false"
            required>
          <input
            type="text"
            class="input input-alias"
            name="customAlias"
            placeholder="custom alias (optional)"
            pattern="[a-zA-Z0-9_\-]{3,16}"
            maxlength="16"
            autocomplete="off"
            spellcheck="false">
        </div>
        <button type="button" class="btn-icon row-remove" aria-label="Remove this row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"/>
            <path d="M10 11v6M14 11v6"/>
          </svg>
        </button>
      </div>

      <div class="row-extras">
        <span class="extras-label">Expires in</span>
        <input
          type="number"
          class="input input-days"
          name="expiresInDays"
          min="1"
          max="3650"
          step="1"
          placeholder="30"
          inputmode="numeric"
          autocomplete="off">
        <span class="extras-label">days</span>
        <label class="check-permanent">
          <input type="checkbox" class="check-input">
          <span>permanent</span>
        </label>
      </div>

      <p class="row-error" data-error hidden></p>
    </div>
  </template>

  <template id="tpl-result-success">
    <div class="result result-success">
      <div class="result-main">
        <a class="result-short" data-short target="_blank" rel="noopener"></a>
        <p class="result-long" data-long></p>
      </div>
      <div class="result-actions">
        <button type="button" class="btn-icon btn-copy" data-copy aria-label="Copy short link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
    </div>
  </template>

  <template id="tpl-result-failure">
    <div class="result result-failure">
      <div class="result-main">
        <p class="result-error-title">Couldn't shorten this one</p>
        <p class="result-long" data-long></p>
        <p class="result-error-message" data-error></p>
      </div>
    </div>
  </template>

  <template id="tpl-history-item">
    <div class="history-item">
      <div class="history-main">
        <a class="history-short" data-short target="_blank" rel="noopener"></a>
        <p class="history-long" data-long></p>
        <p class="history-meta" data-meta></p>
      </div>
      <div class="history-actions">
        <button type="button" class="btn-icon btn-copy" data-copy aria-label="Copy short link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
        <button type="button" class="btn-icon btn-remove-history" data-remove aria-label="Remove from history">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>
  </template>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="/app.js"></script>
</body>
</html>
